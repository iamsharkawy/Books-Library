<!-- Modern Hero Header for Search -->
<div class="relative pt-32 pb-16 bg-white overflow-hidden border-b border-slate-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
      <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-500 to-cyan-500">Search</span> Books
    </h1>
    <p class="mt-4 max-w-2xl text-lg text-slate-500 mx-auto">
      Find exactly what you're looking for in our extensive finance library.
    </p>

    <!-- Search Bar -->
    <div class="mt-10 max-w-xl mx-auto relative flex items-center shadow-lg rounded-full focus-within:ring-4 focus-within:ring-indigo-100 transition-shadow">
      <div class="absolute left-4 text-slate-400">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input 
        type="text" 
        [(ngModel)]="searchQuery" 
        (keyup)="onSearch()"
        placeholder="Type a book name or starting letter..."
        class="w-full pl-12 pr-6 py-4 rounded-full border-none focus:outline-none focus:ring-0 text-slate-900 text-lg bg-white"
      >
    </div>
  </div>
</div>

<!-- Loading State -->
<div *ngIf="isLoading" class="flex flex-col items-center justify-center py-20">
  <div class="w-16 h-16 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
  <h2 class="mt-6 text-xl font-medium text-slate-700">Loading library database...</h2>
</div>

<!-- Empty / Not Found State -->
<div *ngIf="!isLoading && searchQuery && filteredBooks.length === 0" class="flex flex-col items-center justify-center py-32 px-4 text-center animate-fade-in-up">
  <div class="w-24 h-24 mb-6 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 shadow-sm">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
    </svg>
  </div>
  <h2 class="text-2xl font-bold text-slate-900 mb-2">No books found</h2>
  <p class="text-slate-500 max-w-md mx-auto">We couldn't find any books matching "<span class="font-semibold">{{searchQuery}}</span>". Try another search term!</p>
</div>

<!-- Prompt State (Typing nothing) -->
<div *ngIf="!isLoading && !searchQuery" class="flex flex-col items-center justify-center py-32 px-4 text-center">
  <h2 class="text-xl font-medium text-slate-400">Start typing to browse our collection</h2>
</div>

<!-- Results Grid Section -->
<section *ngIf="!isLoading && filteredBooks.length > 0" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
    <h3 class="text-lg font-semibold text-slate-700">Search Results ({{filteredBooks.length}})</h3>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 justify-items-center">
    <div *ngFor="let card of filteredBooks" class="w-full max-w-sm">
      <app-card 
        [key]="card.key" 
        [title]="card.title" 
        [authors]="card.authors" 
        [publicationYear]="card.first_publish_year" 
        [cover_id]="card.cover_id">
      </app-card>
    </div>
  </div>
</section>
