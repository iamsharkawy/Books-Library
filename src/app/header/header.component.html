<header>
  <!-- Glassmorphism Navbar -->
  <nav class="fixed w-full z-50 top-0 left-0 bg-white/80 backdrop-blur-md border-b border-gray-100 shadow-sm transition-all duration-300">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-20">
        <!-- Logo -->
        <a class="flex items-center gap-2 group" [routerLink]="['']">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center text-white font-bold text-xl shadow-lg shadow-indigo-500/30 group-hover:scale-105 transition-transform">
            B
          </div>
          <h2 class="font-bold text-2xl tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-700">Books<span class="text-indigo-600">Store</span></h2>
        </a>

        <!-- Desktop Menu -->
        <ul class="hidden md:flex items-center space-x-8">
          <li>
            <a [routerLink]="['']" class="text-slate-600 hover:text-indigo-600 font-medium text-sm uppercase tracking-wider transition-colors relative after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-indigo-600 after:transition-all hover:after:w-full">Home</a>
          </li>
          <li>
            <a [routerLink]="['search']" class="text-slate-600 hover:text-indigo-600 font-medium text-sm uppercase tracking-wider transition-colors relative after:absolute after:-bottom-2 after:left-0 after:h-0.5 after:w-0 after:bg-indigo-600 after:transition-all hover:after:w-full">Search</a>
          </li>
          <li>
            <a [routerLink]="['wish-list']" class="px-5 py-2.5 rounded-full bg-slate-900 text-white font-medium text-sm hover:bg-indigo-600 hover:shadow-lg hover:shadow-indigo-500/30 transition-all duration-300 transform hover:-translate-y-0.5">Wish List</a>
          </li>
        </ul>

        <!-- Mobile Menu Toggle (simplified for modern design) -->
        <input type="checkbox" id="check" class="hidden" />
        <label for="check" class="md:hidden cursor-pointer text-slate-900 p-2">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </label>
      </div>
    </div>
  </nav>
</header>
