<!-- Modern Hero Header for Wishlist -->
<div class="relative pt-32 pb-16 bg-white overflow-hidden border-b border-slate-100">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
    <h1 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-slate-900">
      Your <span class="text-transparent bg-clip-text bg-gradient-to-r from-rose-500 to-pink-500">Wishlist</span>
    </h1>
    <p class="mt-4 max-w-2xl text-lg text-slate-500 mx-auto">
      Books you've saved for later. Ready to dive in?
    </p>
  </div>
</div>

<!-- Empty State -->
<div *ngIf="wishlistItems.length === 0" class="flex flex-col items-center justify-center py-32 px-4 text-center">
  <div
    class="w-24 h-24 mb-6 rounded-full bg-slate-50 flex items-center justify-center border border-slate-100 shadow-sm">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-slate-300" fill="none" viewBox="0 0 24 24"
      stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
        d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
    </svg>
  </div>
  <h2 class="text-2xl font-bold text-slate-900 mb-2">Your wishlist is empty</h2>
  <p class="text-slate-500 max-w-md mx-auto mb-8">You haven't added any books to your wishlist yet. Explore our library
    to find your next great read.</p>
  <a [routerLink]="['/']"
    class="px-6 py-3 rounded-full bg-indigo-600 text-white font-semibold hover:bg-indigo-700 hover:shadow-lg hover:shadow-indigo-500/30 transition-all transform hover:-translate-y-0.5">
    Explore Library
  </a>
</div>

<!-- Grid Section -->
<section *ngIf="wishlistItems.length > 0" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
  <div class="flex items-center justify-between mb-8 pb-4 border-b border-slate-100">
    <h3 class="text-lg font-semibold text-slate-700">Saved Books ({{wishlistItems.length}})</h3>
  </div>

  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8 justify-items-center">
    <div *ngFor="let item of wishlistItems" class="w-full max-w-sm">
      <app-card [key]="item.key" [title]="item.title" [authors]="item.authors" [publicationYear]="item.publicationYear"
        [cover_id]="item.cover_id">
      </app-card>
    </div>
  </div>
</section>
